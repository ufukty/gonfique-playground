name = "gonfique-playground"
main = "worker/index.ts"
compatibility_date = "2026-06-09"
preview_urls = true

[build]
command = "npm run build"

[assets]
binding = "ASSETS"
directory = "./build"
html_handling = "drop-trailing-slash"
not_found_handling = "none"

[[routes]]
pattern = "gonfique.ufukty.com"
zone_name = "gonfique.ufukty.com"
custom_domain = true
